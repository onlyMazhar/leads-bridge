<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Bridge</title>

    <!-- Oswald Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

    <!-- CSS Link -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <header>
        <nav class="header navbar flex flex-between">
            <div>
                <img src="assets/images/icons/Logo.png" alt="">
            </div>
            <div class="flex-between ">
                <ul class="nav-links flex">
                    <li><a href="#">Service</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
                <button class="btn-primary btn-txt-bl">Book a Free Consultation</button>
            </div>
        </nav>

    </header>

    <!-- Hero Section -->
    <!-- Hero Section -->
    <section class="flex-between hero">
        <!-- Div Left -->
        <!-- Div Left -->

        <div class="stat-card   income-card">
            <p>Total Incomes</p>
            <div class="chart-container">
                <div class="bar-group">
                    <div class="bar" style="height:60px;"></div>
                    <p>Jan</p>
                </div>
                <div class="bar-group">
                    <div class="bar" style="height: 80px;"></div>
                    <p>Feb</p>
                </div>
                <div class="bar-group">
                    <div class="bar" style="height: 62px;"></div>
                    <p>Mar</p>
                </div>
                <div class="bar-group">
                    <div class="bar active" style="height: 80px;"></div>
                    <p>Apr</p>
                </div>
                <div class="bar-group">
                    <div class="bar" style="height: 35px;"></div>
                    <p>May</p>
                </div>
                <div class="bar-group">
                    <div class="bar" style="height: 90px;"></div>
                    <p>Jun</p>
                </div>
            </div>
        </div>


        <!-- Div Center -->
        <!-- Div Center -->
        <div class="center-div">
            <div class="flex-center">
                <div>
                    <img src="assets/images/icons/amazon.jpg" alt="company icon">
                </div>
                <p>
                    Your Full-Service
                    <span>
                        Amazon Partner
                    </span>
                </p>
            </div>
            <h1>
                Turn Your Amazon Struggles into Success—Save Time,
                <span>
                    Maximize Profits!
                </span>
            </h1>
            <button class="btn-primary">Book a Free Consultation</button>
        </div>

        <!-- Div Right -->
        <!-- Div Right -->


        <div class="stat-card user-card flex right-card ">
            <div class="avatar-group flex">
                <div class="avatar"><img src="https://i.pravatar.cc/100?u=1" alt="user"></div>
                <div class="avatar"><img src="https://i.pravatar.cc/100?u=2" alt="user"></div>
                <div class="avatar"><img src="https://i.pravatar.cc/100?u=3" alt="user"></div>
            </div>
            <div class="stat-content">
                <h6>45k+ Users</h6>
                <p class="rating-text"><span>★</span> 4.7 Rating</p>
            </div>
        </div>


    </section>



</body>

</html>
